<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes liens utiles</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
    background:#121212;
    color:white;
}

h1{
    text-align:center;
}

.carte{
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:12px;
    padding:15px;
    margin:15px 0;
}

a{
    color:#4da6ff;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<h1>🌙 Mes liens utiles</h1>

<div id="conteneur-liens"></div>

<script>

const liens = [

    {
        nom: "tous les pilot",
        description: "pilot PC",
        url: "https://fichiers2.touslesdrivers.com/Mes_Drivers_3.0.4.exe"
    },

    {
        nom: "YouTube",
        description: "Plateforme vidéo",
        url: "https://youtube.com"
    },

    {
        nom: "GitHub",
        description: "Mes projets",
        url: "https://github.com"
    }

];

const conteneur = document.getElementById("conteneur-liens");

liens.forEach(lien => {

    conteneur.innerHTML += `
        <div class="carte">
            <h2>${lien.nom}</h2>
            <p>${lien.description}</p>
            <a href="${lien.url}" target="_blank">
                Ouvrir
            </a>
        </div>
    `;

});

</script>

</body>
</html>
