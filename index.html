<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes liens utiles</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: #121212;
            color: #ffffff;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .carte {
            background: #1e1e1e;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .carte:hover {
            transform: translateY(-2px);
        }

        .carte h2 {
            margin-top: 0;
        }

        a {
            text-decoration: none;
            color: #4da6ff;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>🌙 Mes liens utiles</h1>

    <div class="carte">
        <h2>ChatGPT</h2>
        <p>Assistant IA</p>
        <a href="https://chatgpt.com" target="_blank">
            Ouvrir
        </a>
    </div>

    <div class="carte">
        <h2>YouTube</h2>
        <p>Plateforme vidéo</p>
        <a href="https://youtube.com" target="_blank">
            Ouvrir
        </a>
    </div>

    <div class="carte">
        <h2>GitHub</h2>
        <p>Mes projets et dépôts</p>
        <a href="https://github.com" target="_blank">
            Ouvrir
        </a>
    </div>

    <div class="footer">
        Mon portail personnel de liens
    </div>

</body>
</html>
